services:

  skillfusion-db-test:
    image: postgres:17-alpine
    container_name: skillfusion-db-test
    restart: unless-stopped
    env_file:
      - .env.test
    environment:
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      # POSTGRES_DB: ${PGDATABASE}
      PGDATA: /mydbdata
    ports:
      - ${PGPORT}:5432 # "left:right" → "l:r" → "local:remote"
    volumes:
      - "skillfusion_db-test:/mydbdata"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${PGUSER}", "-d", "${PGDATABASE}"]
      interval: 5s
      timeout: 3s
      retries: 5

  skillfusion-gql-api-test:
    env_file:
      - .env.test
    container_name: skillfusion-gql-api-test
    restart: unless-stopped
    build: 
      context: ./
      dockerfile: Dockerfile
    volumes:
      - ./:/app
      - ~/.pnpm-store:/root/.pnpm-store
      - /app/node_modules
    ports: 
      - ${PORT}:4000
    environment:
      PORT: ${PORT}
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}
      # PGDATABASE: ${PGDATABASE}
      # PGHOST: ${PGHOST} # skillfusion-db-test
      PGPORT: ${PGPORT}
      DATABASE_URL: postgres://${PGUSER}:${PGPASSWORD}@${PGHOST}:5432/${PGDATABASE}
    depends_on:
      skillfusion-db-test:
        condition: service_healthy
    command: ${CMD}

volumes: 
  skillfusion_db-test: